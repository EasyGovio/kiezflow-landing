function getView() { return document.getElementById("dynamicView"); }

function detectLanguage() {
    var userLang = navigator.language || navigator.userLanguage;
    if (userLang.indexOf("tr") === 0) return "tr";
    if (userLang.indexOf("de") === 0) return "de";
    return "en";
}

function render() {
    var v = getView();
    if (!v) return;
    if (state === "lang") renderLang(v);
    else if (state === "neighborhood") renderNeighborhood(v);
    else if (state === "interests") renderInterests(v);
    else if (state === "result") renderResult(v);
    window.scrollTo(0, 0);
}

// renderLang function updated with "Did you know?" section
function renderLang(v) {
    var current = texts[lang];
    var html = '<div class="lang-selector">' +
        '<button class="lang-btn ' + (lang === 'tr' ? 'active' : '') + '" onclick="setLang(\'tr\')">🇹🇷 TÜRKÇE</button>' +
        '<button class="lang-btn ' + (lang === 'de' ? 'active' : '') + '" onclick="setLang(\'de\')">🇩🇪 DEUTSCH</button>' +
        '<button class="lang-btn ' + (lang === 'en' ? 'active' : '') + '" onclick="setLang(\'en\')">🇬🇧 ENGLISH</button>' +
        '</div>' +
        '<div class="start-card">' +
        '<h2>🏘️ ' + current.title + '</h2>' +
        '<p>' + current.desc + '</p>';
    
    // Add "Did you know?" section
    var didyouknowHtml = '<div style="margin: 20px 0; display: flex; flex-direction: column; gap: 12px;">';
    for (var i = 0; i < current.didyouknow_cards.length; i++) {
        var card = current.didyouknow_cards[i];
        didyouknowHtml += '<div style="background: #f8fafc; border-radius: 16px; padding: 16px; border-left: 4px solid #F6B45F; display: flex; gap: 12px; text-align: left;">' +
            '<div style="font-size: 1.5rem;">' + card.emoji + '</div>' +
            '<div style="font-size: 0.9rem; color: #1a2c3e; line-height: 1.5;">' + card.text + '</div>' +
            '</div>';
    }
    didyouknowHtml += '</div>';
    
    html += didyouknowHtml +
        '<button class="btn-primary" onclick="startNeighborhood()">' + current.start + '</button>' +
        '</div>';
    v.innerHTML = html;
}

function setLang(l) {
    lang = l;
    render();
}

function startNeighborhood() {
    state = "neighborhood";

    }
    optionsHtml += '</select>';
    var html = '<div class="start-card">' +
        '<h3>' + current.neighborhood_label + '</h3>' +
        optionsHtml +
        '<button class="btn-primary" onclick="saveNeighborhood()">' + current.next + '</button>' +
        '</div>';
    v.innerHTML = html;
}

function saveNeighborhood() {
    var select = document.getElementById("neighborhoodSelect");
    if (select) selectedNeighborhood = select.value;
    if (selectedNeighborhood) {
        state = "interests";
        selectedInterests = [];
        render();
    }
}

function renderInterests(v) {
    var current = texts[lang];
    var interests = [
        { id: "sozial", label: current.interests.sozial },
        { id: "kinder", label: current.interests.kinder },
        { id: "jugend", label: current.interests.jugend },
        { id: "seniors", label: current.interests.seniors },
        { id: "sprach", label: current.interests.sprach },
        { id: "arbeit", label: current.interests.arbeit },
        { id: "gesundheit", label: current.interests.gesundheit },
        { id: "kultur", label: current.interests.kultur }
    ];
    var checkboxesHtml = '';
    for (var i = 0; i < interests.length; i++) {
        var isChecked = (selectedInterests.indexOf(interests[i].id) !== -1);
        checkboxesHtml += '<div class="interest-check' + (isChecked ? ' selected' : '') + '" data-id="' + interests[i].id + '" onclick="toggleInterest(this)">' + interests[i].label + '</div>';
    }
    var html = '<div class="start-card">' +
        '<h3>' + current.interests_label + '</h3>' +
        '<div class="interests-group" id="interestsGroup">' + checkboxesHtml + '</div>' +
        '<div id="interestWarning" class="warning"></div>' +
        '<button class="btn-primary" onclick="finishInterests()">' + current.finish + '</button>' +
        '<button class="btn-primary" style="margin-top:10px; background:#6c757d;" onclick="goBackNeighborhood()">' + current.back + '</button>' +
        '</div>';
    v.innerHTML = html;
}

function toggleInterest(el) {
    var id = el.getAttribute("data-id");
    var index = selectedInterests.indexOf(id);
    if (index === -1) {
        if (selectedInterests.length >= maxInterests) {
            var warnDiv = document.getElementById("interestWarning");
            if (warnDiv) warnDiv.textContent = texts[lang].interests_label.replace("(max 3)", "");
            return;
        }
        selectedInterests.push(id);
        el.classList.add("selected");
    } else {
        selectedInterests.splice(index, 1);
        el.classList.remove("selected");
    }
    var warnDiv = document.getElementById("interestWarning");
    if (warnDiv) warnDiv.textContent = "";
}

function finishInterests() {
    if (selectedInterests.length === 0) {
        var warnDiv = document.getElementById("interestWarning");
        if (warnDiv) warnDiv.textContent = texts[lang].interests_label;
        return;
    }
    state = "result";
    render();
}

function goBackNeighborhood() {
    state = "neighborhood";
    render();
}

function renderResult(v) {
    var current = texts[lang];
    var neighborhoodKey = selectedNeighborhood;
    var resourcesHtml = "";
    for (var i = 0; i < selectedInterests.length; i++) {
        var interest = selectedInterests[i];
        var items = resourceData[neighborhoodKey] && resourceData[neighborhoodKey][interest];
        if (items && items.length) {
            for (var j = 0; j < items.length; j++) {
                resourcesHtml += '<div class="resource-item"><strong>' + items[j] + '</strong><br><small>🔗 ' + (lang === "tr" ? "Website yakında" : (lang === "de" ? "Website bald" : "Website soon")) + '</small></div>';
            }
        } else {
            resourcesHtml += '<div class="resource-item"><strong>' + (lang === "tr" ? "Yakında veriler" : (lang === "de" ? "Daten bald" : "Data soon")) + '</strong><br><small>' + (lang === "tr" ? "Bu ilgi alanı için kaynaklar yakında eklenecek." : (lang === "de" ? "Ressourcen für dieses Interesse werden bald hinzugefügt." : "Resources for this interest will be added soon.")) + '</small></div>';
        }
    }
    if (resourcesHtml === "") {
        resourcesHtml = '<p>' + (lang === "tr" ? "Henüz kayıtlı kaynak yok." : (lang === "de" ? "Noch keine Ressourcen." : "No resources yet.")) + '</p>';
    }
    var shareTextFull = current.share_text_prefix + selectedNeighborhood + current.share_text_suffix;
    var waitlistHtml = '<div class="waitlist-container">' +
        '<h4>📧 ' + current.waitlist_title + '</h4>' +
        '<div class="waitlist-form">' +
        '<input type="email" id="waitlist-email" class="waitlist-input" placeholder="' + current.waitlist_placeholder + '">' +
        '<button class="btn-waitlist" onclick="submitWaitlist()">' + current.waitlist_button + '</button>' +
        '</div>' +
        '</div>';
    var html = '<div class="result-card">' +
        '<h3>' + current.results_title + ' — ' + selectedNeighborhood + '</h3>' +
        resourcesHtml +
        '<div class="disclaimer">' + current.realtime_note + '</div>' +
        '</div>' +
        '<div class="share-section">' +
        '<p>📣 ' + current.recommend + '</p>' +
        '<button class="btn-share" onclick="shareResult(\'' + shareTextFull.replace(/'/g, "\\'") + '\')">📢 ' + current.share_button + '</button>' +
        '<div style="margin-top:12px">' +
        '<a class="btn-feedback" href="mailto:info@kiezflow.de?subject=KiezFlow%20Feedback">📧 ' + current.feedback + '</a>' +
        '</div>' +
        '</div>' +
        waitlistHtml +
        '<div class="footer-note">' +
        '🚀 ' + current.beta_note + '<br>' +
        '© 2026 PACDI — kiezflow.de<br>' +
        current.privacy_note +
        '</div>';
    v.innerHTML = html;
}

function shareResult(shareText) {
    if (navigator.share) {
        navigator.share({
            title: "KiezFlow",
            text: shareText,
            url: window.location.href
        });
    } else {
        navigator.clipboard.writeText(shareText + " " + window.location.href).then(function() {
            alert(texts[lang].waitlist_success);
        }).catch(function() {
            alert(texts[lang].waitlist_error);
        });
    }
}

function submitWaitlist() {
    var emailInput = document.getElementById("waitlist-email");
    if (!emailInput) return;
    var email = emailInput.value.trim();
    if (!email || email.indexOf("@") === -1 || email.indexOf(".") === -1) {
        alert(texts[lang].waitlist_error);
        return;
    }
    var subject = encodeURIComponent("Waitlist: " + email);
    var body = encodeURIComponent("I would like to join the KiezFlow waitlist.\nEmail: " + email);
    window.location.href = "mailto:info@kiezflow.de?subject=" + subject + "&body=" + body;
    alert(texts[lang].waitlist_success);
    emailInput.value = "";
}

lang = detectLanguage();
state = "lang";
document.addEventListener("DOMContentLoaded", render);
</script>
</body>
</html>
